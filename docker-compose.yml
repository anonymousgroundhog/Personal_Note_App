services:
  app:
    build:
      context: .
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      # Soot tools and app config persisted across rebuilds
      - soot-data:/root/.note-app-security
      - app-data:/root/.personal-note-app
      # APK upload temp dir
      - apk-tmp:/tmp
      # Host home directory — ${HOME} is expanded by Docker Compose from the host shell,
      # so this works automatically on any Linux distro without a setup script.
      - ${HOME}:/root/host-home
      # SSH agent forwarding for git operations
      - $SSH_AUTH_SOCK:/ssh-agent
    environment:
      - NODE_ENV=development
      - GIT_SERVER_PORT=3001
      - GIT_SERVER_HOST=localhost
      - APP_DATA_DIR=.personal-note-app
      - LOG_LEVEL=info
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk
      - ANDROID_SDK_ROOT=/root/Android/Sdk
      - VITE_DOCKER=true
      - HOST_HOME=${HOME}
      - SSH_AUTH_SOCK=/ssh-agent
    stop_signal: SIGTERM
    stop_grace_period: 30s

volumes:
  soot-data:
  app-data:
  apk-tmp:
